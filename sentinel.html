<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Sentinel | تقييم الدرع الرقمي الشخصي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Cairo:wght@300;400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root {
  --obsidian-black:    #05050d;
  --surface-dark:      #0d0d1c;
  --border-glow:       rgba(120, 40, 255, 0.35);
  --border-subtle:     rgba(120, 40, 255, 0.15);
  --purple-core:       #7b2fff;
  --purple-bright:     #9b4fff;
  --purple-dim:        #4a1a99;
  --text-primary:      #f0f0ff;
  --text-secondary:    #9090b8;
  --success:           #22d3ee;
  --danger:            #f43f5e;
  --warning:           #fbbf24;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Tajawal', 'Cairo', sans-serif;
  background: var(--obsidian-black);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  direction: rtl;
}

/* ═══════════════ BACKGROUND ATMOSPHERE ═══════════════ */
.bg-atmosphere { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(123, 47, 255, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(123, 47, 255, 0.04) 1px, transparent 1px); background-size: 48px 48px; animation: gridShift 20s linear infinite; }
@keyframes gridShift { from { transform: translate(0, 0); } to { transform: translate(48px, 48px); } }
.bg-radial { position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 900px; height: 900px; background: radial-gradient(ellipse at center, rgba(123,47,255,0.12) 0%, transparent 70%); animation: pulse 6s ease-in-out infinite alternate; }
@keyframes pulse { from { opacity: 0.5; transform: translateX(-50%) scale(0.95); } to { opacity: 1; transform: translateX(-50%) scale(1.05); } }
.scanline { position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(123,47,255,0.015) 2px, rgba(123,47,255,0.015) 4px); pointer-events: none; animation: scanMove 8s linear infinite; }
@keyframes scanMove { from { background-position: 0 0; } to { background-position: 0 200px; } }

/* ═══════════════ PAGE WRAPPER ═══════════════ */
.page-wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

/* ═══════════════ HEADER ═══════════════ */
.site-header { width: 100%; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-subtle); background: rgba(5,5,13,0.8); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; }
.header-logo { display: flex; align-items: center; gap: 14px; }
.logo-icon { width: 44px; height: 44px; position: relative; }
.logo-icon svg { width: 100%; height: 100%; filter: drop-shadow(0 0 8px rgba(123,47,255,0.8)); animation: logoGlow 3s ease-in-out infinite alternate; }
@keyframes logoGlow { from { filter: drop-shadow(0 0 6px rgba(123,47,255,0.7)); } to { filter: drop-shadow(0 0 14px rgba(155,79,255,1)); } }
.logo-text { display: flex; flex-direction: column; gap: 2px; }
.logo-title { font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 4px; color: #fff; text-shadow: 0 0 20px rgba(123,47,255,0.6); }
.logo-subtitle { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 6px; color: var(--purple-bright); text-transform: uppercase; }
.header-status { display: flex; align-items: center; gap: 24px; }
.status-badge { display: flex; align-items: center; gap: 8px; font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 2px; color: var(--text-secondary); text-transform: uppercase; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: dotBlink 2s ease-in-out infinite; }
@keyframes dotBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ═══════════════ PROGRESS BAR ═══════════════ */
.progress-container { width: 100%; max-width: 820px; padding: 0 24px; margin: 40px auto 30px; }
.progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.progress-label { font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.progress-label::before { content: ''; display: inline-block; width: 4px; height: 12px; background: var(--purple-bright); }
.progress-count { font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--purple-bright); }
.progress-track { width: 100%; height: 4px; background: rgba(123,47,255,0.1); border-radius: 2px; overflow: hidden; position: relative; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-dim), var(--purple-bright), #c084fc); border-radius: 2px; transition: width 0.4s ease; position: relative; box-shadow: 0 0 12px rgba(123,47,255,0.6); width: 0%; }
.progress-fill::after { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 40%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3)); animation: shimmer 2s linear infinite; }
@keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(350%); } }
.progress-steps { display: flex; justify-content: space-between; margin-top: 16px; }
.step-dot { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: default; transition: all 0.3s; }
.step-circle { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid rgba(123,47,255,0.25); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--text-secondary); background: var(--surface-dark); transition: all 0.3s; }
.step-circle.active { border-color: var(--purple-bright); color: var(--purple-bright); box-shadow: 0 0 12px rgba(123,47,255,0.5); }
.step-circle.done { border-color: var(--success); background: rgba(34,211,238,0.1); color: var(--success); box-shadow: 0 0 8px rgba(34,211,238,0.4); }
.step-name { font-family: 'Tajawal', sans-serif; font-size: 10px; color: var(--text-secondary); text-align: center; white-space: nowrap; }
.step-dot.active .step-name { color: var(--purple-bright); }
.step-dot.done  .step-name  { color: var(--success); }

/* ═══════════════ SURVEY SECTION ═══════════════ */
.survey-wrapper { width: 100%; max-width: 820px; padding: 0 24px; margin-bottom: 60px; }
.question-card { background: var(--surface-dark); border: 1px solid var(--border-subtle); padding: 28px 30px; margin-bottom: 20px; position: relative; transition: border-color 0.3s, box-shadow 0.3s; clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%); }
.question-card:hover { border-color: var(--border-glow); box-shadow: 0 0 20px rgba(123,47,255,0.08), inset 0 0 20px rgba(123,47,255,0.02); }
.q-number { font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 3px; color: var(--purple-bright); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.q-number::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border-subtle), transparent); }
.q-text { font-family: 'Tajawal', sans-serif; font-size: 16px; font-weight: 600; color: var(--text-primary); line-height: 1.9; margin-bottom: 20px; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; background: rgba(8,8,15,0.6); border: 1px solid rgba(123,47,255,0.15); cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; }
.option-item:hover { background: rgba(123,47,255,0.06); border-color: rgba(123,47,255,0.4); }
.option-item.selected { background: rgba(123,47,255,0.1); border-color: var(--purple-core); box-shadow: 0 0 12px rgba(123,47,255,0.15); }
.option-item .custom-radio { width: 18px; height: 18px; border: 1.5px solid rgba(123,47,255,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.25s; }
.option-item.selected .custom-radio { border-color: var(--purple-bright); box-shadow: 0 0 6px rgba(123,47,255,0.5); }
.option-item.selected .custom-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--purple-bright); box-shadow: 0 0 6px rgba(123,47,255,0.8); }
.option-label { font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-secondary); line-height: 1.5; flex: 1; transition: color 0.25s; }
.option-item.selected .option-label { color: var(--text-primary); }
.option-score { font-size: 0.8rem; color: #6a6a8a; margin-top: 0.2rem; }

/* Buttons */
.btn-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 30px; padding: 20px 0; border-top: 1px solid var(--border-subtle); flex-wrap: wrap; }
.btn-primary { display: inline-flex; align-items: center; gap: 12px; padding: 15px 40px; background: linear-gradient(135deg, var(--purple-dim) 0%, var(--purple-core) 100%); color: #fff; border: 1px solid var(--purple-bright); font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; text-decoration: none; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%); }
.btn-primary:hover { box-shadow: 0 0 24px rgba(123,47,255,0.5), 0 0 60px rgba(123,47,255,0.2); transform: translateY(-1px); }
.btn-secondary { display: inline-flex; align-items: center; gap: 12px; padding: 14px 32px; background: transparent; color: var(--text-secondary); border: 1px solid rgba(123,47,255,0.25); font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
.btn-secondary:hover { border-color: rgba(123,47,255,0.5); color: var(--text-primary); background: rgba(123,47,255,0.05); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; transform: none; box-shadow: none; }
.hidden { display: none !important; }

/* Result Dashboard */
.result-dashboard { background: rgba(13,13,28,0.95); border: 1px solid var(--border-glow); padding: 40px; text-align: center; backdrop-filter: blur(20px); max-width: 600px; margin: 0 auto; }
.big-score { font-family: 'Orbitron', sans-serif; font-size: 64px; font-weight: 900; text-shadow: 0 0 30px currentColor; }
.score-circle-container { margin: 20px 0; }
.score-label { font-size: 24px; font-weight: 700; margin-top: 10px; }
.analysis-block { display: flex; gap: 20px; margin: 30px 0; text-align: right; }
.analysis-column { flex: 1; background: rgba(8,8,15,0.6); border: 1px solid rgba(123,47,255,0.15); padding: 20px; }
.analysis-column h4 { color: var(--text-primary); margin-bottom: 10px; }
.analysis-column ul { list-style: none; padding: 0; }
.analysis-column li { color: var(--text-secondary); padding: 4px 0; font-size: 14px; }
.recommendation-box { background: rgba(123,47,255,0.05); border: 1px solid var(--border-glow); padding: 20px; margin: 20px 0; font-size: 16px; color: var(--text-primary); }
.action-buttons { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }
.email-send-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
.email-send-group input { width: 250px; padding: 12px 15px; background: rgba(8,8,15,0.8); border: 1px solid rgba(123,47,255,0.3); color: var(--text-primary); font-family: 'Tajawal', sans-serif; }
.completion-id { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 3px; color: rgba(123,47,255,0.5); text-transform: uppercase; margin-top: 20px; }

/* Footer */
.site-footer { width: 100%; padding: 24px 40px; border-top: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.footer-brand { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 3px; color: rgba(123,47,255,0.4); text-transform: uppercase; }
.footer-secure { display: flex; align-items: center; gap: 8px; font-family: 'Rajdhani', sans-serif; font-size: 10px; letter-spacing: 2px; color: rgba(123,47,255,0.35); text-transform: uppercase; }
.footer-secure svg { width: 12px; height: 12px; fill: rgba(123,47,255,0.4); }

@media (max-width: 640px) {
  .site-header { padding: 16px 20px; }
  .progress-container, .survey-wrapper { padding: 0 16px; }
  .progress-steps .step-name { display: none; }
  .btn-row { flex-direction: column-reverse; }
  .btn-primary, .btn-secondary { width: 100%; justify-content: center; }
  .header-status { display: none; }
  .analysis-block { flex-direction: column; }
}
</style>
</head>
<body>

<div class="bg-atmosphere">
  <div class="bg-grid"></div>
  <div class="bg-radial"></div>
  <div class="scanline"></div>
</div>

<div class="page-wrapper">
  <header class="site-header">
    <div class="header-logo">

</div>

        { text: '3 نسخ، على وسيطين مختلفين، ونسخة خارج الموقع.', score: 100, strength: 'نسخ احتياطي ممتاز', action: 'أنت تتبع أفضل الممارسات. اختبر الاستعادة دورياً.' },
        { text: 'نسخة سحابية تلقائية ونسخة يدوية على هاردسك.', score: 60, strength: 'نسخ احتياطي جيد', action: 'أضف نسخة ثالثة خارج الموقع.' },
        { text: 'نسخة سحابية فقط.', score: 30, strength: null, action: 'احتفظ بنسخة على هاردسك خارجي أيضاً.' },
        { text: 'لا أملك أي نسخة احتياطية.', score: 0, strength: null, action: 'أنشئ نسخة احتياطية اليوم.' }
    ]},
    { text: 'كيف تتعامل مع رسالة غير متوقعة تطلب تحديث بياناتك؟', category: 'الوعي الأمني', options: [
        { text: 'أتجاهلها وأتحقق من الموقع الرسمي للجهة.', score: 100, strength: 'وعي أمني ممتاز', action: 'أنت نموذج يحتذى به.' },
        { text: 'لا أضغط الرابط، لكني قد أرد على المرسل.', score: 60, strength: 'حذر جيد', action: 'لا ترد على المرسل.' },
        { text: 'أضغط الرابط إذا بدا رسمياً.', score: 30, strength: null, action: 'لا تضغط أي رابط. اكتب عنوان الموقع بنفسك.' },
        { text: 'أضغط الرابط فوراً، قد يكون شيئاً مهماً.', score: 0, strength: null, action: 'توقف فوراً عن فتح الروابط غير المتوقعة.' }
    ]}
];

const threatDescriptions = {
    'اختراق الحسابات': 'قد يستخدم شخص كلمة مرور مسربة للدخول إلى حساباتك.',
    'برمجيات خبيثة': 'قد يصاب جهازك بفيروس من تحميل ملف مصاب.',
    'التنصت على البيانات': 'الشبكات العامة قد تسمح باعتراض بياناتك.',
    'فقدان البيانات': 'بدون نسخ احتياطية، قد تفقد كل شيء فجأة.',
    'التصيد الاحتيالي': 'قد تصلك رسالة تبدو رسمية وتدفعك لإدخال بياناتك في موقع مزيف.'
};

let currentQuestionIndex = 0;
let selectedAnswers = {};

const questionContainer = document.getElementById('questionContainer');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const submitBtn = document.getElementById('submitBtn');
const progressFill = document.getElementById('progressFill');
const progressCount = document.getElementById('progressCount');
const progressSteps = document.getElementById('progressSteps');
const resultDashboard = document.getElementById('resultDashboard');

function buildProgressSteps() {
    progressSteps.innerHTML = '';
    questions.forEach((_, i) => {
        const dot = document.createElement('div');
        dot.className = 'step-dot';
        dot.innerHTML = `<div class="step-circle" id="stepCircle${i}">${String(i+1).padStart(2,'0')}</div><div class="step-name">${questions[i].category}</div>`;
        progressSteps.appendChild(dot);
    });
}

function updateProgress() {
    const pct = ((currentQuestionIndex) / questions.length) * 100;
    progressFill.style.width = pct + '%';
    progressCount.textContent = currentQuestionIndex + ' / ' + questions.length;
    for (let i = 0; i < questions.length; i++) {
        const c = document.getElementById('stepCircle' + i);
        const d = c.closest('.step-dot');
        c.classList.remove('active', 'done');
        d.classList.remove('active', 'done');
        if (i < currentQuestionIndex) { c.classList.add('done'); d.classList.add('done'); c.textContent = '✓'; }
        else if (i === currentQuestionIndex) { c.classList.add('active'); d.classList.add('active'); }
    }
}

function updateNavigation() {
    const isLast = currentQuestionIndex === questions.length - 1;
    prevBtn.disabled = currentQuestionIndex === 0;
    nextBtn.classList.toggle('hidden', isLast);
    submitBtn.classList.toggle('hidden', !isLast);
    submitBtn.disabled = Object.keys(selectedAnswers).length < questions.length;
    if (!isLast) nextBtn.disabled = selectedAnswers[currentQuestionIndex] === undefined;
}

function renderQuestion(index) {
    const q = questions[index];
    let html = `<div class="question-card"><div class="q-number">السؤال ${index+1}</div><div class="q-text">${q.text}</div><div class="options">`;
    q.options.forEach((opt, optIndex) => {
        html += `<div class="option-item${selectedAnswers[index] === optIndex ? ' selected' : ''}" onclick="selectOption(${index}, ${optIndex}, this)">
            <div class="custom-radio"></div>
            <div><span class="option-label">${opt.text}</span><div class="option-score">${opt.score} نقطة</div></div>
        </div>`;
    });
    html += '</div></div>';
    questionContainer.innerHTML = html;
    updateProgress();
    updateNavigation();
}

function selectOption(qIndex, optIndex, element) {
    selectedAnswers[qIndex] = optIndex;
    const allOptions = element.parentElement.querySelectorAll('.option-item');
    allOptions.forEach(opt => opt.classList.remove('selected'));
    element.classList.add('selected');
    updateNavigation();
}

function nextQuestion() {
    if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion(currentQuestionIndex);
    }
}

function prevQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion(currentQuestionIndex);
    }
}

function calculateScore() {
    let total = 0;
    questions.forEach((q, i) => total += q.options[selectedAnswers[i]].score);
    return Math.round((total / (questions.length * 100)) * 100);
}

function submitSurvey() {
    if (Object.keys(selectedAnswers).length < questions.length) {
        alert('يرجى الإجابة على جميع الأسئلة أولاً.');
        return;
    }

    const score = calculateScore();
    const ref = 'OA-' + new Date().getFullYear() + '-' + Math.random().toString(36).substr(2,6).toUpperCase();
    document.getElementById('surveyRef').textContent = 'REF: ' + ref;

    // تحليل النتائج
    const strengths = [], weaknesses = [];
    questions.forEach((q, i) => {
        const answer = q.options[selectedAnswers[i]];
        if (answer.score >= 80 && answer.strength) strengths.push(answer.strength);
        else if (answer.score <= 30) weaknesses.push(q.category);
    });
    const threat = weaknesses.length > 0 ? (weaknesses[0] === 'إدارة الهوية والوصول' || weaknesses[0] === 'المصادقة الثنائية' ? 'اختراق الحسابات' : weaknesses[0] === 'أمان الشبكات' ? 'التنصت على البيانات' : weaknesses[0] === 'أمان الأجهزة' ? 'برمجيات خبيثة' : weaknesses[0] === 'النسخ الاحتياطي' ? 'فقدان البيانات' : 'التصيد الاحتيالي') : 'لا توجد تهديدات واضحة';
    const recommendation = score >= 80 ? 'حصن منيع. استمر في مراجعة إعداداتك دورياً.' : score >= 50 ? 'تحت المراقبة. عالج الأولويات العاجلة لتحسين وضعك.' : 'مكشوف رقمياً. ابدأ فوراً ببناء أساسيات الحماية.';

    // عرض النتيجة
    document.getElementById('progressContainer').classList.add('hidden');
    questionContainer.classList.add('hidden');
    document.querySelector('.btn-row').classList.add('hidden');
    resultDashboard.classList.remove('hidden');

    document.getElementById('finalScore').textContent = score + '/100';
    const color = score >= 80 ? '#22d3ee' : score >= 50 ? '#fbbf24' : '#f43f5e';
    document.getElementById('finalScore').style.color = color;
    document.getElementById('scoreLabel').textContent = score >= 80 ? 'حصن منيع' : score >= 50 ? 'تحت المراقبة' : 'مكشوف رقمياً';
    document.getElementById('scoreLabel').style.color = color;

    document.getElementById('strengthsList').innerHTML = strengths.length ? strengths.map(s => `<li>${s}</li>`).join('') : '<li>لا توجد نقاط قوة بارزة.</li>';
    document.getElementById('weaknessesList').innerHTML = weaknesses.length ? weaknesses.map(w => `<li>${w}</li>`).join('') : '<li>لا توجد نقاط ضعف حرجة.</li>';
    document.getElementById('recommendation').innerHTML = `<strong>🎯 توصيتنا:</strong> ${recommendation}`;

    window._surveyResult = { score, strengths, weaknesses, recommendation, threat };
}

function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const result = window._surveyResult;
    if (!result) return;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(18);
    doc.setTextColor(100);
    doc.text("Obsidian Aegis - Personal Security Assessment", 105, 20, { align: "center" });
    doc.setFontSize(12);
    doc.text("Report ID: " + document.getElementById('surveyRef').textContent.replace('REF: ',''), 105, 30, { align: "center" });

    doc.setFillColor(40,40,80);
    doc.rect(15, 40, 180, 30, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(22);
    doc.text(`Score: ${result.score}/100`, 105, 55, { align: "center" });
    doc.setFontSize(14);
    doc.text(result.score >= 80 ? 'Fortress' : (result.score >= 50 ? 'Under Watch' : 'Exposed'), 105, 65, { align: "center" });

    doc.setTextColor(0,0,0);
    doc.setFontSize(12);
    doc.text("Strengths:", 20, 85);
    doc.setFontSize(10);
    let y = 95;
    result.strengths.forEach(s => { doc.text("• " + s, 25, y); y += 7; });

    y += 5;
    doc.setFontSize(12);
    doc.text("Weaknesses:", 20, y); y += 10;
    doc.setFontSize(10);
    result.weaknesses.forEach(w => { doc.text("• " + w, 25, y); y += 7; });

    y += 10;
    doc.setFontSize(12);
    doc.text("Recommendation:", 20, y); y += 8;
    doc.setFontSize(10);
    const splitRec = doc.splitTextToSize(result.recommendation, 160);
    doc.text(splitRec, 25, y);

    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text("Generated by Obsidian Aegis Sentinel™", 105, 280, { align: "center" });

    doc.save(`Obsidian_Sentinel_Report_${new Date().toISOString().slice(0,10)}.pdf`);
}

function sendReport() {
    const email = document.getElementById('clientEmail').value;
    if (!email) { alert('يرجى إدخال بريدك الإلكتروني أولاً.'); return; }
    alert('شكراً! سيتم إرسال التقرير إلى بريدك الإلكتروني بعد تفعيل الخدمة قريباً. يمكنك الآن تنزيل التقرير PDF.');
}

function restartSurvey() {
    currentQuestionIndex = 0;
    selectedAnswers = {};
    resultDashboard.classList.add('hidden');
    document.getElementById('progressContainer').classList.remove('hidden');
    questionContainer.classList.remove('hidden');
    document.querySelector('.btn-row').classList.remove('hidden');
    renderQuestion(0);
}

prevBtn.addEventListener('click', prevQuestion);
nextBtn.addEventListener('click', nextQuestion);
submitBtn.addEventListener('click', submitSurvey);

buildProgressSteps();
renderQuestion(0);
</script>
</body>
</html>
