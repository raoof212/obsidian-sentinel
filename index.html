<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Aegis | منصة التقييم الأمني</title>
    <style>
        body {
            background-color: #05050d;
            color: #f0f0ff;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            direction: rtl;
        }
        .portal {
            text-align: center;
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            color: #9090b8;
            margin-bottom: 40px;
        }
        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: #0d0d1c;
            border: 1px solid rgba(120, 40, 255, 0.35);
            padding: 30px;
            border-radius: 8px;
            width: 250px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(123, 47, 255, 0.3);
        }
        .card h2 {
            font-size: 1.5rem;
            margin: 15px 0;
        }
        .card .icon {
            font-size: 3rem;
        }
    </style>
</head>
<body>
    <div class="portal">
        <h1>🛡️ Obsidian Aegis</h1>
        <p>منصة التقييم الأمني من شركة Obsidian Aegis. اختر نوع التقييم المناسب لك.</p>
        <div class="cards">
            <a href="sentinel.html" class="card">
                <div class="icon">👤</div>
                <h2>Obsidian Sentinel</h2>
                <p>تقييم الأمن الشخصي للأفراد. اعرف درجة حمايتك الرقمية في دقيقتين.</p>
            </a>
            <a href="https://raoof212.github.io/obsidian-enterprise-assessment/" class="card">
                <div class="icon">🏢</div>
                <h2>تقييم المؤسسات</h2>
                <p>تقييم شامل للشركات والمؤسسات. تحليل متكامل للبنية التحتية والسياسات.</p>
            </a>
        </div>
    </div>
</body>
</html>
