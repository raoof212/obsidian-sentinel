<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="اختبار تفاعلي سريع لتقييم مستوى الحماية الرقمية وإنتاج خطة تحسين شخصية.">
    <title>Obsidian Sentinel | تقييم الدرع الرقمي</title>
    <style>
        :root {
            --obsidian: #0B0B0B;
            --obsidian-surface: #121212;
            --amethyst: #7B2FBE;
            --amethyst-glow: #9B4DDB;
            --platinum: #E5E4E2;
            --platinum-dim: #A0A0A0;
            --teal: #1ed6a3;
            --amber: #FFAA00;
            --red: #FF3B5C;
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: var(--platinum);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            direction: rtl;
            font-family: var(--font);
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--obsidian-surface);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 0 30px rgba(123, 47, 190, 0.15);
            position: relative;
        }

        /* شريط التقدم */
        .progress-container {
            width: 100%;
            background-color: #1a1a1a;
            border-radius: 20px;
            height: 8px;
            margin: 2rem 0;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .progress-bar {
            width: 16.67%;
            height: 100%;
            background: linear-gradient(90deg, var(--amethyst), var(--amethyst-glow));
            border-radius: 20px;
            transition: width 0.4s ease;
        }

        .progress-text {
            text-align: center;
            color: var(--platinum-dim);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        /* شعار الشركة */
        .brand-lockup {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .brand-logo-frame {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1a1a2e, var(--obsidian));
            border: 2px solid var(--amethyst);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(123, 47, 190, 0.3);
        }

        .brand-logo-frame::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(123, 47, 190, 0.3));
            animation: shield-glimmer 3s ease-in-out infinite;
        }

        @keyframes shield-glimmer {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            position: relative;
            z-index: 1;
        }

        .brand-text strong {
            display: block;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .brand-text small {
            color: var(--amethyst-glow);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* الأسئلة */
        .question {
            margin-bottom: 2rem;
        }

        .question-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option {
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--platinum);
            text-align: right;
            font-size: 1rem;
            position: relative;
        }

        .option:hover {
            background-color: #2a2a2a;
            border-color: var(--amethyst);
        }

        .option.selected {
            background-color: #2a1a3a;
            border-color: var(--amethyst-glow);
            box-shadow: 0 0 12px rgba(123, 47, 190, 0.3);
        }

        .option.selected::before {
            content: '✓';
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--amethyst-glow);
            font-weight: bold;
        }

        .option.selected .option-text {
            padding-right: 2rem;
        }

        .option-score {
            display: block;
            font-size: 0.8rem;
            color: var(--platinum-dim);
            margin-top: 0.4rem;
        }

        /* أزرار التنقل */
        .nav-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: space-between;
        }

        .btn {
            padding: 0.9rem 1.8rem;
            background: linear-gradient(135deg, var(--amethyst), #4A0E7E);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 120px;
        }

        .btn:hover {
            box-shadow: 0 0 20px rgba(123, 47, 190, 0.5);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--amethyst);
            color: var(--platinum);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(123, 47, 190, 0.1);
            box-shadow: none;
            transform: none;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
            transform: none;
            box-shadow: none;
        }

        .hidden {
            display: none !important;
        }

        /* النتيجة */
        .result {
            text-align: center;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: conic-gradient(var(--amethyst) 0deg, #2a2a2a 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem auto;
            position: relative;
            box-shadow: 0 0 25px rgba(123, 47, 190, 0.2);
        }

        .score-inner {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: var(--obsidian-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: white;
        }

        .score-level {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 1rem 0;
        }

        .score-message {
            color: var(--platinum-dim);
            margin-bottom: 1rem;
            line-height: 1.6;
            font-size: 1rem;
        }

        /* بطاقات التحسين */
        .section-title {
            text-align: right;
            margin: 2rem 0 1rem;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .plan-card {
            background-color: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 1.2rem;
            margin-top: 0.8rem;
            text-align: right;
        }

        .plan-card p {
            margin: 0.4rem 0;
            color: var(--platinum-dim);
            line-height: 1.5;
        }

        .plan-card strong {
            color: var(--platinum);
        }

        .threat-box {
            background-color: rgba(255, 170, 0, 0.08);
            border: 1px solid var(--amber);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            text-align: center;
        }

        .threat-box strong {
            color: var(--amber);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 0.4rem;
        }

        .strength-item {
            background-color: rgba(30, 214, 163, 0.08);
            border-right: 3px solid var(--teal);
            padding: 0.5rem 1rem;
            margin: 0.4rem 0;
            border-radius: 4px;
        }

        .weakness-item {
            background-color: rgba(255, 59, 92, 0.08);
            border-right: 3px solid var(--red);
            padding: 0.5rem 1rem;
            margin: 0.4rem 0;
            border-radius: 4px;
        }

        .report-id {
            color: var(--platinum-dim);
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        .cta-link {
            color: var(--amethyst-glow);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 1rem;
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1.5rem;
            }

            .nav-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="container" id="app">
        <!-- واجهة الأسئلة -->
        <div id="quiz">
            <!-- شعار الشركة -->
            <div class="brand-lockup">
                <span class="brand-logo-frame" aria-hidden="true">
                    <img class="brand-logo" src="assets/obsidian-aegis-logo.png" alt="شعار Obsidian Aegis" />
                </span>
                <span class="brand-text">
                    <strong>Obsidian Sentinel</strong>
                    <small>Digital Shield Assessment</small>
                </span>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p class="progress-text" id="progress-text">السؤال 1 من 6</p>

            <div id="question-container"></div>

            <div class="nav-buttons">
                <button class="btn btn-secondary" id="prev-btn" type="button" disabled>السابق</button>
                <button class="btn" id="next-btn" type="button">التالي</button>
                <button class="btn hidden" id="submit-btn" type="button">تحليل الأمان</button>
            </div>
        </div>

        <!-- واجهة النتيجة -->
        <div id="result" class="result hidden">
            <div class="brand-lockup" style="justify-content: center;">
                <span class="brand-logo-frame" aria-hidden="true">
                    <img class="brand-logo" src="assets/obsidian-aegis-logo.png" alt="شعار Obsidian Aegis" />
                </span>
                <span class="brand-text">
                    <strong>Obsidian Aegis</strong>
                    <small>Cyber Defense</small>
                </span>
            </div>

            <div class="report-id" id="report-id"></div>
            <div class="score-circle" id="score-circle">
                <div class="score-inner" id="score-text">0</div>
            </div>
            <p class="score-level" id="score-level"></p>
            <p class="score-message" id="score-message"></p>

            <div id="strength-weakness-container"></div>
            <div id="threat-container"></div>
            <div id="plan-container"></div>

            <button class="btn" style="margin-top: 1.5rem; width: 100%;" onclick="shareResult()">📤 شارك نتيجتك</button>
            <button class="btn btn-secondary" style="margin-top: 0.5rem; width: 100%;" onclick="location.reload()">إعادة الاختبار</button>
        </div>
    </main>

    <script>
        let currentScore = 0;
        let currentLevelText = '';
        let currentReportId = '';
        let currentQuestionIndex = 0;
        let selectedAnswers = {};

        const questions = [
            {
                id: 'passwords',
                text: 'أي وصف أقرب لطريقتك في التعامل مع كلمات المرور؟',
                category: 'إدارة الهوية والوصول',
                options: [
                    { text: 'أستخدم برنامجًا خاصًا لحفظ كلمات المرور وتوليد كلمات قوية تلقائيًا.', score: 100, strength: 'كلمات مرور قوية', action: 'استمر في استخدام مدير كلمات المرور. أنت في المسار الصحيح.' },
                    { text: 'أحرص أن تكون كلمة المرور مختلفة لكل حساب مهم.', score: 60, strength: 'تنوع كلمات المرور', action: 'جرب مدير كلمات مرور مثل Bitwarden، سيوفر عليك عناء التذكر ويزيد قوتها.' },
                    { text: 'أستخدم كلمات مختلفة لكن سهلة التذكر.', score: 30, strength: null, action: 'ثبّت مدير كلمات مرور ودعه يولد كلمات قوية بدلاً من الاعتماد على ذاكرتك.' },
                    { text: 'للأسف، أستخدم نفس كلمة المرور في أكثر من مكان.', score: 0, strength: null, action: 'لا تقلق، هذه أكثر نقطة نراها. ابدأ فوراً بتغيير كلمة مرور بريدك الإلكتروني أولاً.' }
                ]
            },
            {
                id: '2fa',
                text: 'هل قمت بتفعيل المصادقة الثنائية (2FA) على حساباتك المهمة؟',
                category: 'المصادقة الثنائية',
                options: [
                    { text: 'نعم، جميع الحسابات المهمة (بريد، بنوك، تواصل اجتماعي).', score: 100, strength: 'مصادقة ثنائية شاملة', action: 'ممتاز! استمر في مراجعة إعدادات الأمان كل فترة.' },
                    { text: 'بعضها، مثل البريد والبنوك فقط.', score: 60, strength: 'مصادقة ثنائية جزئية', action: 'فعّل المصادقة الثنائية على حسابات التواصل الاجتماعي أيضاً.' },
                    { text: 'حساب واحد فقط.', score: 30, strength: null, action: 'ابدأ بتفعيلها على بريدك الإلكتروني، فهو مفتاح استرداد كل حساباتك.' },
                    { text: 'لم أقم بتفعيلها بعد.', score: 0, strength: null, action: 'أعلم أن الخطوة قد تبدو مزعجة، لكنها أهم ما ستفعله اليوم. ابدأ ببريد Gmail أو Outlook.' }
                ]
            },
            {
                id: 'network',
                text: 'كيف تتصل بالإنترنت عندما تتعامل مع معلومات حساسة؟',
                category: 'أمان الشبكات',
                options: [
                    { text: 'أعتمد على شبكتي المنزلية المؤمنة، وأستخدم VPN عند الحاجة.', score: 100, strength: 'اتصال شبكي آمن', action: 'استمر في تجنب الشبكات العامة للمعاملات الحساسة.' },
                    { text: 'أستخدم شبكتي المنزلية فقط، لكن بدون VPN.', score: 60, strength: 'شبكة منزلية موثوقة', action: 'فكر في استخدام VPN عند السفر أو العمل من أماكن عامة.' },
                    { text: 'أستخدم WiFi عامة لكن أتجنب المعاملات الحساسة.', score: 30, strength: null, action: 'فعّل VPN على جوالك ليكون تلقائياً عند الاتصال بشبكات عامة.' },
                    { text: 'أستخدم أي شبكة متاحة، حتى للبنوك.', score: 0, strength: null, action: 'توقف عن استخدام الشبكات العامة للمعاملات الحساسة فوراً. استخدم بيانات الجوال أو VPN.' }
                ]
            },
            {
                id: 'device',
                text: 'ما مستوى الحماية على جهازك الأساسي (جوال/حاسوب)؟',
                category: 'أمان الأجهزة',
                options: [
                    { text: 'الجهاز محدث تلقائياً وعليه برنامج حماية متقدم.', score: 100, strength: 'جهاز محمي بالكامل', action: 'استمر في الحفاظ على التحديثات التلقائية.' },
                    { text: 'الجهاز محدث وجدار الحماية مفعل.', score: 60, strength: 'تحديثات منتظمة', action: 'ثبّت برنامج حماية موثوقاً، فالجدار الناري وحده لا يكفي.' },
                    { text: 'الجهاز محدث لكن لا يوجد برنامج حماية.', score: 30, strength: null, action: 'ثبّت برنامج حماية فوراً. الجدار الناري وحده لا يكفي.' },
                    { text: 'لا أعرف آخر مرة حدثت فيها الجهاز.', score: 0, strength: null, action: 'حدّث جهازك فوراً. فعّل التحديثات التلقائية، ثم افحصه.' }
                ]
            },
            {
                id: 'backup',
                text: 'كيف تحافظ على نسخة احتياطية من بياناتك المهمة؟',
                category: 'النسخ الاحتياطي',
                options: [
                    { text: '3 نسخ، على وسيطين مختلفين، ونسخة خارج الموقع.', score: 100, strength: 'نسخ احتياطي ممتاز', action: 'أنت تتبع أفضل الممارسات. اختبر استعادة الملفات دورياً.' },
                    { text: 'نسخة سحابية تلقائية ونسخة يدوية على هاردسك.', score: 60, strength: 'نسخ احتياطي جيد', action: 'أضف نسخة ثالثة خارج الموقع أو في خدمة سحابية مختلفة.' },
                    { text: 'نسخة سحابية فقط.', score: 30, strength: null, action: 'احتفظ بنسخة على هاردسك خارجي أيضاً. السحابة وحدها ليست كافية.' },
                    { text: 'لا أملك أي نسخة احتياطية.', score: 0, strength: null, action: 'أنشئ نسخة احتياطية اليوم. استخدم Google Drive أو iCloud مع هاردسك خارجي.' }
                ]
            },
            {
                id: 'awareness',
                text: 'كيف تتعامل مع رسالة غير متوقعة تطلب تحديث بياناتك؟',
                category: 'الوعي الأمني',
                options: [
                    { text: 'أتجاهلها وأتحقق من الموقع الرسمي للجهة.', score: 100, strength: 'وعي أمني ممتاز', action: 'أنت نموذج يحتذى به. استمر في هذا السلوك.' },
                    { text: 'لا أضغط الرابط، لكني قد أرد على المرسل.', score: 60, strength: 'حذر جيد', action: 'لا ترد على المرسل. تواصل مع الجهة عبر قنواتها الرسمية فقط.' },
                    { text: 'أضغط الرابط إذا بدا رسمياً.', score: 30, strength: null, action: 'لا تضغط أي رابط. اكتب عنوان الموقع بنفسك أو استخدم التطبيق الرسمي.' },
                    { text: 'أضغط الرابط فوراً، قد يكون شيئاً مهماً.', score: 0, strength: null, action: 'توقف فوراً عن فتح الروابط غير المتوقعة. استخدم حارس إيجيس لفحصها.' }
                ]
            }
        ];

        const threatDescriptions = {
            'اختراق الحسابات': 'قد يستخدم شخص كلمة مرور مسربة من موقع آخر للدخول إلى حساباتك. الحل: كلمات مرور فريدة ومصادقة ثنائية.',
            'برمجيات خبيثة': 'قد يصاب جهازك بفيروس من تحميل ملف مصاب أو تحديث وهمي. الحل: برنامج حماية موثوق وتحديثات دورية.',
            'التنصت على البيانات': 'الشبكات العامة قد تسمح باعتراض بياناتك. الحل: تجنب الشبكات العامة أو استخدم VPN.',
            'فقدان البيانات': 'بدون نسخ احتياطية، قد تفقد كل شيء فجأة. الحل: أنشئ نسخة احتياطية اليوم.',
            'التصيد الاحتيالي': 'قد تصلك رسالة تبدو رسمية وتدفعك لإدخال بياناتك في موقع مزيف. الحل: لا تضغط على الروابط.'
        };

        // عناصر DOM
        const questionContainer = document.getElementById('question-container');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');

        function generateUUID() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            if (window.crypto && typeof window.crypto.getRandomValues === 'function') {
                const bytes = new Uint8Array(16);
                window.crypto.getRandomValues(bytes);
                bytes[6] = (bytes[6] & 0x0f) | 0x40;
                bytes[8] = (bytes[8] & 0x3f) | 0x80;
                const hex = Array.from(bytes, byte => byte.toString(16).padStart(2, '0')).join('');
                return `${hex.slice(0, 8)}-${hex.slice(8, 12)}-${hex.slice(12, 16)}-${hex.slice(16, 20)}-${hex.slice(20)}`;
            }
            return `${Date.now().toString(16)}-${Math.random().toString(16).slice(2)}`;
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressText.textContent = `السؤال ${currentQuestionIndex + 1} من ${questions.length} (${Math.round(progress)}%)`;
        }

        function updateNavigationState() {
            const isLastQuestion = currentQuestionIndex === questions.length - 1;
            const answeredCurrent = selectedAnswers[currentQuestionIndex] !== undefined;
            const answeredAll = Object.keys(selectedAnswers).length === questions.length;

            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = !answeredCurrent;
            submitBtn.disabled = !answeredAll;

            nextBtn.classList.toggle('hidden', isLastQuestion);
            submitBtn.classList.toggle('hidden', !isLastQuestion);
        }

        function renderQuestion(index) {
            const q = questions[index];
            questionContainer.innerHTML = '';
            
            const div = document.createElement('div');
            div.className = 'question';
            
            const title = document.createElement('p');
            title.className = 'question-title';
            title.textContent = `${index + 1}. ${q.text}`;
            div.appendChild(title);
            
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            q.options.forEach((opt, optIndex) => {
                const optBtn = document.createElement('button');
                optBtn.className = 'option';
                optBtn.type = 'button';
                
                const textSpan = document.createElement('span');
                textSpan.className = 'option-text';
                textSpan.textContent = opt.text;
                
                const scoreSpan = document.createElement('span');
                scoreSpan.className = 'option-score';
                scoreSpan.textContent = `${opt.score} نقطة`;
                
                optBtn.appendChild(textSpan);
                optBtn.appendChild(scoreSpan);
                
                if (selectedAnswers[index] === optIndex) {
                    optBtn.classList.add('selected');
                }
                
                optBtn.addEventListener('click', () => {
                    optionsDiv.querySelectorAll('.option').forEach(btn => {
                        btn.classList.remove('selected');
                    });
                    optBtn.classList.add('selected');
                    selectedAnswers[index] = optIndex;
                    updateNavigationState();
                });
                
                optionsDiv.appendChild(optBtn);
            });

            div.appendChild(optionsDiv);
            questionContainer.appendChild(div);
            
            updateProgress();
            updateNavigationState();
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion(currentQuestionIndex);
            }
        }

        function calculateScore() {
            let total = 0;
            questions.forEach((q, index) => {
                total += q.options[selectedAnswers[index]].score;
            });
            return Math.round((total / (questions.length * 100)) * 100);
        }

        function getScoreLevel(score) {
            if (score >= 80) return { 
                text: '🟢 حصن منيع', 
                color: '#00D68F', 
                message: 'نتيجتك ممتازة. أنت تطبق معظم الممارسات الأمنية الأساسية. استمر في المراجعة الدورية واختبار النسخ الاحتياطية.' 
            };
            if (score >= 50) return { 
                text: '🟡 تحت المراقبة', 
                color: '#FFAA00', 
                message: 'لديك أساس جيد، لكن هناك ثغرات تحتاج إلى معالجة. ركز على الأولويات العالية أولاً.' 
            };
            return { 
                text: '🔴 مكشوف رقمياً', 
                color: '#FF3B5C', 
                message: 'وضعك الحالي يحتاج إلى إجراءات فورية. لا تقلق، كل نقطة ضعف هنا يمكن معالجتها بخطوات بسيطة.' 
            };
        }

        function getStrengthsAndWeaknesses() {
            const strengths = [];
            const weaknesses = [];
            questions.forEach((q, index) => {
                const answer = q.options[selectedAnswers[index]];
                if (answer.score >= 80 && answer.strength) {
                    strengths.push({ text: answer.strength, category: q.category });
                }
                if (answer.score <= 30) {
                    weaknesses.push({ text: q.category, score: answer.score });
                }
            });
            weaknesses.sort((a, b) => a.score - b.score);
            return { strengths, weaknesses };
        }

        function getMostLikelyThreat() {
            const weakest = questions.reduce((current, q, index) => {
                const answer = q.options[selectedAnswers[index]];
                return answer.score < current.score ? { category: q.category, score: answer.score } : current;
            }, { category: questions[0].category, score: 101 });

            const threatMap = {
                'إدارة الهوية والوصول': 'اختراق الحسابات',
                'المصادقة الثنائية': 'اختراق الحسابات',
                'أمان الشبكات': 'التنصت على البيانات',
                'أمان الأجهزة': 'برمجيات خبيثة',
                'النسخ الاحتياطي': 'فقدان البيانات',
                'الوعي الأمني': 'التصيد الاحتيالي'
            };
            const threat = threatMap[weakest.category] || 'هجمات متنوعة';
            return {
                threat,
                description: threatDescriptions[threat] || '',
                exposureLevel: Math.round(100 - weakest.score)
            };
        }

        function getImprovementPlan() {
            const plans = [];
            questions.forEach((q, index) => {
                const answer = q.options[selectedAnswers[index]];
                if (answer.score < 100) {
                    plans.push({
                        title: q.category,
                        action: answer.action,
                        time: '15 دقيقة'
                    });
                }
            });
            return plans;
        }

        function showResults() {
            const score = calculateScore();
            const level = getScoreLevel(score);
            const { strengths, weaknesses } = getStrengthsAndWeaknesses();
            const threatData = getMostLikelyThreat();
            const plans = getImprovementPlan();
            currentReportId = "OA-" + generateUUID().slice(0, 8).toUpperCase();
            currentScore = score;
            currentLevelText = level.text;

            document.getElementById('quiz').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');

            document.getElementById('report-id').textContent = `رقم التقرير: ${currentReportId}`;
            document.getElementById('score-text').textContent = score;
            document.getElementById('score-level').textContent = level.text;
            document.getElementById('score-level').style.color = level.color;
            document.getElementById('score-message').textContent = level.message;

            const circle = document.getElementById('score-circle');
            const angle = (score / 100) * 360;
            circle.style.background = `conic-gradient(#7B2FBE ${angle}deg, #2a2a2a 0deg)`;

            const swContainer = document.getElementById('strength-weakness-container');
            let swHTML = '';
            if (strengths.length > 0) {
                swHTML += '<div class="section-title">✅ نقاط القوة</div>';
                strengths.forEach(s => {
                    swHTML += `<div class="strength-item">${s.text} (${s.category})</div>`;
                });
            }
            if (weaknesses.length > 0) {
                swHTML += '<div class="section-title">⚠️ نقاط تحتاج تحسين</div>';
                weaknesses.forEach(w => {
                    swHTML += `<div class="weakness-item">${w.text}</div>`;
                });
            }
            swContainer.innerHTML = swHTML;

            const threatContainer = document.getElementById('threat-container');
            threatContainer.innerHTML = `
                <div class="threat-box">
                    🎯 <strong>التهديد الأكثر احتمالاً لك:</strong>
                    ${threatData.threat}
                    <div style="color: var(--platinum-dim); margin-top: 0.4rem; font-size: 0.9rem;">${threatData.description}</div>
                    <div style="color: var(--platinum-dim); margin-top: 0.5rem;">مستوى التعرض: ${threatData.exposureLevel}%</div>
                </div>
            `;

            const planContainer = document.getElementById('plan-container');
            planContainer.innerHTML = '<div class="section-title">🛡️ خطة التحسين الفورية</div>';
            plans.forEach(plan => {
                const card = document.createElement('div');
                card.className = 'plan-card';
                card.innerHTML = `
                    <p><strong>${plan.title}</strong></p>
                    <p>🛡️ <strong>الإجراء:</strong> ${plan.action}</p>
                    <p>⏱️ الوقت المتوقع: ${plan.time}</p>
                `;
                planContainer.appendChild(card);
            });

            const cta = document.createElement('p');
            cta.style.textAlign = 'center';
            cta.style.marginTop = '1.5rem';
            cta.innerHTML = '🔗 <strong>احمِ نفسك الآن مع حارس إيجيس:</strong> <a href="https://t.me/ObsidianAegisBot" target="_blank" style="color:#9B4DDB;">@ObsidianAegisBot</a>';
            planContainer.appendChild(cta);
        }

        function showResultsSafe() {
            if (Object.keys(selectedAnswers).length !== questions.length) {
                alert('⚠️ يرجى الإجابة على جميع الأسئلة قبل تحليل الأمان.');
                return;
            }
            try {
                showResults();
            } catch (error) {
                console.error('خطأ في تحليل الأمان:', error);
                alert('حدث خطأ غير متوقع. الرجاء تحديث الصفحة والمحاولة مرة أخرى.');
            }
        }

        function shareResult() {
            const shareText = `🛡️ مستوى الدرع الرقمي\n\n${currentLevelText}\n\nدرجة الحماية:\n${currentScore}/100\n\n📋 رقم التقرير: ${currentReportId}\n\nاختبر نفسك مجاناً:`;
            if (navigator.share) {
                navigator.share({
                    title: 'Obsidian Sentinel | تقييم الدرع الرقمي',
                    text: shareText,
                    url: window.location.href
                }).catch(() => {});
            } else {
                const textArea = document.createElement('textarea');
                textArea.value = shareText + '\n' + window.location.href;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('تم نسخ النتيجة إلى الحافظة! شاركها مع أصدقائك.');
            }
        }

        nextBtn.addEventListener('click', nextQuestion);
        prevBtn.addEventListener('click', prevQuestion);
        submitBtn.addEventListener('click', showResultsSafe);
        renderQuestion(0);
    </script>
</body>
</html>
